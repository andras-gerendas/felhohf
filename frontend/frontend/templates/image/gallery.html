{% extends 'base.html' %}

{% block content %}

<div class="gallery">
    {% for image in images %}

    <div class="image-row">
        <div class="image-container">
            <img src="static/images/{{image.src}}" alt={{image.caption}} />

            <div class="image-title">{{image.caption}}</div>
        </div>
    </div>

    {% endfor %}
</div>

{% endblock %}
