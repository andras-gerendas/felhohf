{% extends 'base.html' %}

{% block content %}

<div class="gallery">
    {% for image in images %}

    <div class="image-row">
        <div class="image-container">
            {% if image.src != 'empty' %}
            <img src="static/images/{{image.src}}" alt={{image.caption}} />
            {% else %}
            <a href="/refresh/{{image.id}}"><i class="fa fa-refresh" aria-hidden="true"></i></a>
            {% endif %}

            <div class="image-title">{{image.caption}}</div>
        </div>
    </div>

    {% endfor %}
</div>

{% endblock %}
